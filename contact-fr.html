<main class="page-contact">

    <h2>Me contacter</h2>
    <p class="contact-intro">
      N’hésitez pas à m’écrire pour toute question ou pour réserver un premier cours.
    </p>

    <form class="contact-form" action="https://formspree.io/f/TON_CODE_ICI" method="POST">
      <input type="text" name="name" placeholder="Votre nom" required>
      
      <input type="email" name="email" placeholder="Votre adresse email" required>
      
      <input type="tel" name="telephone" placeholder="Votre téléphone (facultatif)">
      
      <textarea name="message" rows="6" placeholder="Votre message" required></textarea>

      <button type="submit" class="btn">Envoyer</button>
    </form>

    <div class="contact-buttons">
     <a href="https://calendly.com/sandrine-bouvet/french-conversation-session" class="btn">Réserver un premier cours</a>
